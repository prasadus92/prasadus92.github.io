name: Deploy

# prasad.tech is served by Cloudflare Pages (project "prasad-tech"), which runs
# the A/B middleware in functions/_middleware.js. On every push to main we build
# and upload the site to Cloudflare Pages. (GitHub Pages is no longer used: the
# domain's DNS points at Cloudflare.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      # npm install (not ci) so the lockfile reconciles under CI's own npm.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      # The Cloudflare token is injected ONLY into this deploy step, never the
      # build above, so untrusted npm dependencies never see it.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name prasad-tech --branch main --commit-dirty=true
